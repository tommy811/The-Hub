dependencies:
  - name: npm:axe-core
    note: >
      Injected into Puppeteer/Playwright pages for WCAG violation
      detection via axe.run(). Install via: npm install axe-core
  - name: npm:puppeteer OR npm:playwright
    note: >
      Browser automation for loading pages and injecting axe-core.
      Use whichever the project already has. Install via:
      npm install puppeteer OR npm install playwright
  - name: lighthouse
    note: >
      CLI for accessibility scoring per page. Optional but recommended.
      Run via: npx lighthouse. Install globally: npm install -g lighthouse
  - name: issue tracker CLI (conditional)
    note: >
      Only needed in markdown+issues output mode. GitHub: gh.
      GitLab: glab. Linear: linear CLI or API. Jira: go-jira CLI.

